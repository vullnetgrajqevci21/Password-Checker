<!DOCTYPE html>
<html>
<head>
  <title>Password Strength Project</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: #fff;
      text-align: center;
      padding: 50px;
    }

    .hidden { display: none; }

    h1, h2 { color: #ffdd57; }

    button {
      padding: 15px 25px;
      border: none;
      border-radius: 50%;
      background-color: #ffdd57;
      color: #333;
      font-size: 24px;
      cursor: pointer;
    }

    button:hover { background-color: #ffc107; }

    input {
      padding: 12px;
      width: 300px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
    }

    #result { margin-top: 20px; font-size: 20px; }

    .bar {
      height: 25px;
      width: 300px;
      background: #444;
      border-radius: 12px;
      margin: 20px auto;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: red;
      border-radius: 12px;
      transition: width 0.3s;
    }

    #suggestion {
      margin-top: 15px;
      font-size: 16px;
      color: #ffdd57;
    }
  </style>
</head>
<body>
  <!-- Front Page -->
  <div id="frontPage">
    <h1>Welcome to My Science Fair Project</h1>
    <button onclick="showChecker()">▶</button>
  </div>

  <!-- Password Checker Page -->
  <div id="checkerPage" class="hidden">
    <h2>Password Strength Checker</h2>
    <input type="password" id="password" placeholder="Enter your password" onkeyup="checkPassword()">
    <div id="result"></div>
    <div class="bar"><div class="fill" id="strengthBar"></div></div>
    <div id="suggestion"></div>
  </div>

  <script>
    function showChecker() {
      document.getElementById("frontPage").classList.add("hidden");
      document.getElementById("checkerPage").classList.remove("hidden");
    }

    function checkPassword() {
      const pwd = document.getElementById("password").value;
      let score = 0;

      if (pwd.length >= 8) score++;
      if (/[A-Z]/.test(pwd)) score++;
      if (/[a-z]/.test(pwd)) score++;
      if (/[0-9]/.test(pwd)) score++;
      if (/[^A-Za-z0-9]/.test(pwd)) score++;

      let strength, barColor, suggestion;
      let barWidth = (score / 5) * 100;

      switch(score) {
        case 0: case 1: 
          strength = "Very Weak"; barColor = "red";
          suggestion = "Try making it longer and adding numbers, symbols, and uppercase letters."; break;
        case 2: 
          strength = "Weak"; barColor = "orange";
          suggestion = "Add more variety: uppercase letters, numbers, or symbols."; break;
        case 3: 
          strength = "Medium"; barColor = "yellow";
          suggestion = "Pretty good, but add symbols or more length for extra security."; break;
        case 4: 
          strength = "Strong"; barColor = "lightgreen";
          suggestion = "Strong password! Adding one or two symbols makes it even better."; break;
        case 5: 
          strength = "Very Strong"; barColor = "green";
          suggestion = "Excellent password! This is very secure."; break;
      }

      document.getElementById("result").innerText = "Strength: " + strength;
      document.getElementById("strengthBar").style.width = barWidth + "%";
      document.getElementById("strengthBar").style.background = barColor;
      document.getElementById("suggestion").innerText = suggestion;
    }
  </script>
</body>
</html>
